name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (manifest + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Phase-0 manifest contract gate
        # Asserts dist/repo.meta.json parses, carries all required fields,
        # and every exposes.* path resolves on disk. Cross-repo tier-3
        # contract per .github/docs/AI-discoverability-plan.md §3.4.
        # Runs before the npm install so a broken manifest fails fast
        # (no Node toolchain spin-up needed).
        run: make check-manifest

      - name: docs/ prose-only gate
        # Cross-repo guardrail: docs/ holds only human-readable prose.
        run: make check-docs-prose

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (npm run lint)
        # `lint` in package.json is `tsc -noEmit -p ./` — the strict-mode
        # type-check gate for the extension host.
        run: npm run lint

      - name: Compile extension (npm run compile)
        # `compile` in package.json is `tsc -p ./` — writes out/extension.js.
        run: npm run compile
