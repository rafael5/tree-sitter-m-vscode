name: Release

# Publishes the extension to the VS Code Marketplace when a version
# tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#
# Requires repo secret VSCE_PAT — an Azure DevOps Personal Access Token
# for publisher `rafael5` with the Marketplace → Manage scope. Create at
# https://dev.azure.com → User settings → Personal access tokens, then
# add it under Settings → Secrets and variables → Actions.

on:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish to VS Code Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Guard — tag matches package.json version
        # The tag is the release source of truth; a v1.2.3 tag must point
        # at a commit whose package.json says 1.2.3, or the Marketplace
        # version would silently disagree with the git tag.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag != package.json version $pkg"
            exit 1
          fi

      - name: TypeScript type-check (npm run lint)
        run: npm run lint

      - name: Compile extension (npm run compile)
        run: npm run compile

      - name: Publish (vsce)
        # `vsce publish` re-runs vscode:prepublish (npm run compile) and
        # packages internally before uploading. .vscodeignore controls
        # what ships; the squared images/icon.png is the marketplace icon.
        run: npx @vscode/vsce publish --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
